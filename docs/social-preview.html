<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    background: #0d1117;
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    width: 100%;
    height: 100%;
    padding: 64px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(88,166,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,166,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .top {
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
  }
  .icon {
    width: 52px;
    height: 52px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .repo-name {
    font-size: 22px;
    color: #58a6ff;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .repo-owner {
    font-size: 15px;
    color: #484f58;
    margin-top: 2px;
  }
  .middle {
    position: relative;
  }
  h1 {
    font-size: 52px;
    font-weight: 700;
    color: #e6edf3;
    line-height: 1.1;
    letter-spacing: -1px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin-bottom: 20px;
  }
  h1 span { color: #f7c948; }
  .sub {
    font-size: 20px;
    color: #8b949e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 400;
    line-height: 1.4;
    max-width: 820px;
  }
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }
  .tags {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tag {
    padding: 6px 14px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 20px;
    font-size: 13px;
    color: #8b949e;
    font-family: -apple-system, sans-serif;
  }
  .tag.hot { border-color: #f7c948; color: #f7c948; }
  .count {
    font-size: 17px;
    color: #58a6ff;
    font-family: -apple-system, sans-serif;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .count-item { display: flex; align-items: center; gap: 6px; color: #8b949e; }
  .count-item span { color: #e6edf3; font-weight: 600; }
  .accent-line {
    position: absolute;
    left: 0;
    top: -24px;
    width: 60px;
    height: 3px;
    background: #f7c948;
    border-radius: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-grid"></div>

  <div class="top">
    <div class="icon">📋</div>
    <div>
      <div class="repo-name">claude-md-templates</div>
      <div class="repo-owner">autosergach / github.com</div>
    </div>
  </div>

  <div class="middle">
    <div class="accent-line"></div>
    <h1>Production-ready<br><span>CLAUDE.md</span> templates</h1>
    <div class="sub">Give your AI coding assistant the context it needs.<br>6 templates for React, NestJS, monorepos, React Native &amp; more.</div>
  </div>

  <div class="bottom">
    <div class="tags">
      <div class="tag hot">claude-code</div>
      <div class="tag">react · next.js</div>
      <div class="tag">nestjs</div>
      <div class="tag">react-native</div>
      <div class="tag">monorepo</div>
      <div class="tag">typescript</div>
    </div>
    <div class="count">
      <div class="count-item">📋 <span>6</span> templates</div>
      <div class="count-item">⭐ MIT</div>
    </div>
  </div>
</div>
</body>
</html>
